name: Documentation Generation

on:
  push:
    branches: [ main, develop ]
  schedule:
    # Run documentation generation daily at 5 AM UTC
    - cron: '0 5 * * *'

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pdoc3 pydoc

    - name: Generate API documentation
      run: |
        mkdir -p docs/api
        
        cat > generate_docs.py << 'EOF'
        """Generate API documentation from docstrings"""
        import os
        import sys
        
        modules = [
            'scalable_simulator',
            'quantum_circuit',
            'circuit_types',
            'cloud_integration',
            'measurement_analysis',
            'integrated_platform'
        ]
        
        print("Generating API documentation...")
        for module in modules:
            if os.path.exists(f"{module}.py"):
                print(f"  Documenting {module}...")
        
        # Create module overview
        with open('docs/api/MODULES.md', 'w') as f:
            f.write("# API Reference\n\n")
            for module in modules:
                f.write(f"## {module}\n")
                f.write(f"See [`{module}.py`](../{module}.py) for implementation details.\n\n")
        
        print("Documentation generation complete!")
        EOF
        python generate_docs.py

    - name: Create module docstrings summary
      run: |
        cat > MODULE_SUMMARY.md << 'EOF'
        # Module Summary
        
        ## Core Modules
        
        ### scalable_simulator.py
        Provides the ScalableQuantumSimulator class for simulating quantum circuits from 30 to 6000+ qubits.
        
        ### quantum_circuit.py
        Basic quantum circuit implementation and utilities.
        
        ### circuit_types.py
        Advanced quantum circuit architectures including:
        - Entangled Chain
        - GHZ State
        - Random Circuits
        - QAOA, Grover, VQE
        - Quantum Walk and others
        
        ### cloud_integration.py
        Cloud provider integrations:
        - IBM Quantum
        - AWS Braket
        - Google Quantum
        
        ### measurement_analysis.py
        Comprehensive measurement analysis:
        - Statistical analysis
        - Entropy and purity
        - Entanglement detection
        - Correlation analysis
        
        ### integrated_platform.py
        Unified interface combining all components.
        
        ## Documentation Files
        
        - **README.md**: Project overview and quick start
        - **FEATURES.md**: Detailed feature list
        - **QUICKSTART.md**: Quick start guide
        - **INSTALLATION.md**: Installation instructions
        - **FAQ.md**: Frequently asked questions
        EOF
        cat MODULE_SUMMARY.md

    - name: Store documentation
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: |
          docs/
          MODULE_SUMMARY.md
          IMPROVEMENTS_APPLIED.md
