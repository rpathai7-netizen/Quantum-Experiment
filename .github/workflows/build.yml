name: Build and Release Quantum Experiment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.0.1)'
        required: true
        default: 'v2.0.1'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            name: Windows
            artifact: QuantumExperiment-Windows.exe
            spec: QuantumExperiment.spec
          - os: macos-latest
            name: macOS
            artifact: QuantumExperiment-macOS.app
            spec: QuantumExperiment.spec
          - os: ubuntu-latest
            name: Linux
            artifact: QuantumExperiment-Linux
            spec: QuantumExperiment.spec

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create icon (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      run: |
        python build_exe_installer.py --create-icon-only

    - name: Build executable with PyInstaller
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          pyinstaller --onefile --windowed --icon=quantum_icon.ico gui_application.py --name QuantumExperiment
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          pyinstaller --onefile --windowed --icon=quantum_icon.ico gui_application.py --name QuantumExperiment
        else
          pyinstaller --onefile gui_application.py --name QuantumExperiment
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: dist/QuantumExperiment*

    - name: Test executable (basic)
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          ./dist/QuantumExperiment.exe --help || echo "EXE built successfully"
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          ./dist/QuantumExperiment.app/Contents/MacOS/QuantumExperiment --help || echo "App built successfully"
        else
          ./dist/QuantumExperiment --help || echo "Binary built successfully"
        fi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Quantum Experiment Platform ${{ github.event.inputs.version }}
        body: |
          ## Quantum Experiment Platform ${{ github.event.inputs.version }}

          ### What's New
          - Cross-platform executables for Windows, macOS, and Linux
          - Complete GUI application with 6 real-world use cases
          - 50 everyday use cases for common problems
          - Beginner guide to quantum computing
          - Comprehensive documentation

          ### Downloads
          - **Windows:** QuantumExperiment-Windows.exe
          - **macOS:** QuantumExperiment-macOS.app
          - **Linux:** QuantumExperiment-Linux

          ### Installation
          1. Download the file for your platform
          2. Double-click to run (Windows/macOS) or make executable and run (Linux)
          3. Enjoy quantum computing!

          For full documentation, see the repository.
        files: |
          artifacts/QuantumExperiment-Windows.exe/QuantumExperiment.exe
          artifacts/QuantumExperiment-macOS.app/QuantumExperiment.app
          artifacts/QuantumExperiment-Linux/QuantumExperiment
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}