name: Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install qiskit qiskit-aer numpy
        pip install pytest pytest-cov black flake8 isort

    - name: Install optional cloud dependencies
      run: |
        pip install qiskit-ibm-runtime amazon-braket-sdk cirq --no-deps 2>/dev/null || echo "Warning: Optional cloud dependencies not fully available"
      continue-on-error: true

    - name: Check code formatting with black
      run: black --check . --exclude="(__pycache__|\.git|\.venv|build|dist|QuantumExperiment_Distribution)" || echo "Note: Code formatting issues found (non-critical in CI)"
      continue-on-error: true

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-code is 0 even if there are style violations
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run pytest with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run bandit security checks
      run: |
        bandit -r . -f json -o bandit-report.json || echo "Security scan complete"
      continue-on-error: true

    - name: Check for known vulnerabilities
      run: |
        safety check --json 2>/dev/null || echo "Safety check complete"
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint

    - name: Analyze code with pylint
      run: |
        pylint **/*.py --fail-under=7.0 --max-line-length=120 || echo "Pylint analysis complete"
      continue-on-error: true
