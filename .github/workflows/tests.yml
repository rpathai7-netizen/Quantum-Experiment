name: Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install qiskit qiskit-aer numpy
        pip install pytest pytest-cov black flake8 mypy isort
        pip install -q qiskit-ibm-runtime amazon-braket-sdk cirq 2>/dev/null || echo "Optional cloud deps not available"

    - name: Check code formatting with black
      run: black --check . --exclude="(__pycache__|\.git|\.venv|build|dist)" || true

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # Exit-code is 0 even if there are style violations
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics || true

    - name: Run pytest with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Type check with mypy
      run: mypy . --ignore-missing-imports --no-error-summary 2>/dev/null || true
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run bandit security checks
      run: bandit -r . -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Check for known vulnerabilities
      run: safety check --json || true
      continue-on-error: true
