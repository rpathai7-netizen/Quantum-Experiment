name: Performance Benchmarking

on:
  push:
    branches: [ main, develop ]
  schedule:
    # Run benchmarks daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install qiskit qiskit-aer numpy pytest

    - name: Create benchmark script
      run: |
        cat > run_benchmarks.py << 'EOF'
        """
        Performance benchmarking for Quantum Platform
        """
        import time
        import sys
        from scalable_simulator import ScalableQuantumSimulator
        from circuit_types import QuantumCircuitFactory
        from measurement_analysis import QuantumMeasurementAnalyzer
        
        print("=" * 70)
        print("QUANTUM EXPERIMENT PLATFORM - PERFORMANCE BENCHMARKS")
        print("=" * 70)
        
        # Benchmark 1: Circuit Creation Times
        print("\n[1] Circuit Creation Benchmark")
        print("-" * 70)
        sizes = [10, 50, 100]
        for size in sizes:
            start = time.time()
            qc = QuantumCircuitFactory.create_entangled_chain(size)
            elapsed = time.time() - start
            print(f"  {size} qubits: {elapsed*1000:.3f}ms")
        
        # Benchmark 2: Simulator Initialization
        print("\n[2] Simulator Initialization Benchmark")
        print("-" * 70)
        sizes = [10, 100, 500, 1000]
        for size in sizes:
            start = time.time()
            sim = ScalableQuantumSimulator(size)
            elapsed = time.time() - start
            print(f"  {size} qubits: {elapsed*1000:.3f}ms")
        
        # Benchmark 3: Analysis Performance
        print("\n[3] Measurement Analysis Benchmark")
        print("-" * 70)
        test_counts = {'00': 500, '01': 250, '10': 150, '11': 100}
        
        start = time.time()
        analyzer = QuantumMeasurementAnalyzer(test_counts)
        elapsed = time.time() - start
        print(f"  Initialization: {elapsed*1000:.3f}ms")
        
        start = time.time()
        entropy = analyzer.calculate_shannon_entropy()
        elapsed = time.time() - start
        print(f"  Entropy calculation: {elapsed*1000:.3f}ms")
        
        start = time.time()
        purity = analyzer.calculate_purity()
        elapsed = time.time() - start
        print(f"  Purity calculation: {elapsed*1000:.3f}ms")
        
        print("\n" + "=" * 70)
        print("Benchmarks completed successfully!")
        print("=" * 70)
        EOF
        python run_benchmarks.py

    - name: Store benchmark results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: |
          benchmark_*
          run_benchmarks.py
