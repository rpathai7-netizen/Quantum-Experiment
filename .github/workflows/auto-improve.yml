name: Auto-Improve Code Quality

on:
  schedule:
    # Run code improvements weekly on Monday at 4 AM UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  auto-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install black isort flake8 autopep8
        pip install qiskit qiskit-aer numpy

    - name: Auto-format code with black
      run: |
        echo "Running black code formatter..."
        black . --exclude="(__pycache__|\.git|\.venv|build|dist|QuantumExperiment_Distribution)" || echo "Black formatting applied"
        echo "Black formatting complete"

    - name: Auto-sort imports with isort
      run: |
        echo "Running isort import organizer..."
        isort . --skip-gitignore --skip "__pycache__" --skip "build" --skip "dist" || echo "isort complete"
        echo "isort complete"

    - name: Auto-fix style with autopep8
      run: |
        echo "Running autopep8..."
        find . -name "*.py" -not -path "*./.git/*" -not -path "./.venv/*" -not -path "*/__pycache__/*" -not -path "*/build/*" -not -path "*/dist/*" | while read file; do
          autopep8 --in-place --aggressive --aggressive "$file" || true
        done
        echo "autopep8 complete"

    - name: Create improvement report
      run: |
        cat > IMPROVEMENTS_APPLIED.md << 'EOF'
        # Code Quality Improvements Applied
        
        This automated run applied the following improvements:
        
        ## Formatting
        - **Black**: Consistent code formatting with 88-character line limit
        - **isort**: Organized and sorted imports alphabetically  
        - **autopep8**: Fixed PEP8 style issues
        
        ## What Changed
        - Standardized code formatting across all Python files
        - Organized import statements
        - Fixed spacing and style violations
        - Ensured PEP8 compliance
        
        ## Benefits
        - Improved code readability
        - Easier code reviews
        - Better IDE integration
        - Consistent style across the project
        
        Generated: $(date)
        EOF
        cat IMPROVEMENTS_APPLIED.md

    - name: Check if changes were made
      id: changes
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit improvements
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git config user.name "GitHub Actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "🤖 Automated code quality improvements

- Applied black formatting
- Organized imports with isort
- Fixed PEP8 style issues with autopep8" || echo "No changes to commit"

    - name: Push improvements
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git push || echo "Failed to push changes (may not have permissions)"
      continue-on-error: true
